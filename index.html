<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI News - 매일 만나는 인공지능 트렌드</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load modern Korean font (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1>Daily AI News</h1>
            <p class="subtitle">매일 업데이트되는 인공지능 핵심 뉴스 요약</p>
        </div>
    </header>

    <div class="layout-container container">
        <aside class="sidebar">
            <div class="sidebar-tabs">
                <button id="tab-daily" class="tab-btn active">일별</button>
                <button id="tab-weekly" class="tab-btn">주간</button>
                <button id="tab-monthly" class="tab-btn">월간</button>
            </div>
            <ul id="date-list" class="date-list">
                <!-- Dates will be injected here by JavaScript -->
            </ul>
        </aside>

        <main class="content">
            <h2 id="current-date-heading" class="section-title">최신 뉴스</h2>
            <div id="news-feed" class="news-grid">
                <!-- News cards will be injected here by JavaScript -->
            </div>
        </main>
    </div>

    <section id="affiliate-inquiry" class="affiliate-section">
        <div class="container narrow">
            <h2 class="section-title centered">제휴 및 문의</h2>
            <p class="section-desc centered">AI 뉴스 서비스 제휴, 광고 및 다양한 제보를 기다립니다.</p>
            
            <form action="https://formspree.io/f/mnnjjppw" method="POST" class="inquiry-form">
                <div class="form-group">
                    <label for="name">이름 / 회사명</label>
                    <input type="text" id="name" name="name" placeholder="성함 또는 업체명을 입력해 주세요" required>
                </div>
                
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" placeholder="답변을 받으실 이메일을 입력해 주세요" required>
                </div>

                <div class="form-group">
                    <label for="type">문의 유형</label>
                    <select id="type" name="type" required>
                        <option value="제휴">비즈니스 제휴</option>
                        <option value="광고">광고 문의</option>
                        <option value="제보">뉴스 제보</option>
                        <option value="기타">기타 문의</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 상세히 적어주세요" required></textarea>
                </div>

                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </section>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Daily AI News. All rights reserved.</p>
            <div class="footer-links">
                <a href="#affiliate-inquiry">제휴 및 문의하기</a>
            </div>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
